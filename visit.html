<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6B0F0F">
<title>Vishram Spices · Client Visit Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --maroon: #6B0F0F;
  --maroon-dark: #4A0808;
  --amber: #C89D4C;
  --amber-dark: #9F7236;
  --cream: #FBF5E8;
  --cream-soft: #F4E5D0;
  --ink: #2A1810;
  --ink-soft: #5C453B;
  --ink-muted: #8A766A;
  --line: #E8DCC4;
  --green: #2D7A4C;
  --red: #B53A2D;
  --orange: #C97F2A;
  --shadow-sm: 0 1px 2px rgba(74, 8, 8, 0.06);
  --shadow-md: 0 4px 12px rgba(74, 8, 8, 0.08);
  --shadow-lg: 0 12px 32px rgba(74, 8, 8, 0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }
body { padding-bottom: env(safe-area-inset-bottom); }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* Header */
.app-header {
  background: var(--maroon);
  color: var(--cream);
  padding: 14px 18px;
  padding-top: calc(14px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.app-header h1 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; letter-spacing: 0.3px; }
.app-header h1 .sub { display: block; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400; opacity: 0.7; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
.icon-btn {
  background: rgba(251, 245, 232, 0.12);
  border: none; color: var(--cream);
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: background 0.15s;
}
.icon-btn:active { background: rgba(251, 245, 232, 0.25); }

/* Search + Filters */
.search-bar {
  padding: 14px 16px 10px;
  background: var(--cream);
  position: sticky; top: 64px; z-index: 40;
  border-bottom: 1px solid var(--line);
}
.search-bar input {
  width: 100%; padding: 12px 16px;
  background: white; border: 1.5px solid var(--line); border-radius: 10px;
  font: 500 15px 'DM Sans', sans-serif; color: var(--ink);
  transition: border-color 0.15s;
}
.search-bar input:focus { outline: none; border-color: var(--amber); }
.search-bar input::placeholder { color: var(--ink-muted); }

.filter-chips {
  display: flex; gap: 6px; padding: 0 16px 12px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--cream);
  position: sticky; top: 130px; z-index: 39;
  border-bottom: 1px solid var(--line);
}
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  background: white; border: 1.5px solid var(--line);
  border-radius: 100px;
  font: 600 12px 'DM Sans', sans-serif;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip.active { background: var(--maroon); color: var(--cream); border-color: var(--maroon); }
.chip:active:not(.active) { background: var(--cream-soft); }

/* Client list */
.client-list { padding: 12px 16px 80px; }
.stats-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 6px; margin-bottom: 14px;
}
.stat-pill {
  background: white; padding: 8px 6px; border-radius: 8px;
  border: 1px solid var(--line);
  text-align: center;
}
.stat-pill .num { display: block; font: 700 16px 'Playfair Display', serif; color: var(--maroon); line-height: 1; }
.stat-pill .lbl { display: block; font-size: 9px; color: var(--ink-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

.client-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.client-card.visited::before {
  content: '✓'; position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; background: var(--green); color: white;
  border-radius: 50%; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.client-card.skipped::before {
  content: '−'; position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; background: var(--ink-muted); color: white;
  border-radius: 50%; font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.client-card.attempted::before {
  content: '!'; position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; background: var(--orange); color: white;
  border-radius: 50%; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.client-card:active { transform: scale(0.98); box-shadow: var(--shadow-sm); }

.card-main { flex: 1; min-width: 0; }
.card-name {
  font-family: 'Playfair Display', serif;
  font-weight: 600; font-size: 15px;
  color: var(--ink); line-height: 1.3;
  margin-bottom: 4px;
  padding-right: 24px;
}
.card-meta {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  font-size: 11px; color: var(--ink-muted);
}
.card-meta .chain-tag {
  background: var(--cream-soft); color: var(--amber-dark);
  padding: 2px 8px; border-radius: 6px;
  font-weight: 700; letter-spacing: 0.4px; font-size: 10px;
}
.card-meta .status-dot { font-size: 11px; }
.card-rev {
  font: 700 14px 'DM Sans', sans-serif; color: var(--maroon);
  white-space: nowrap;
  text-align: right;
  line-height: 1.2;
}
.card-rev .lbl { display: block; font-weight: 500; font-size: 9px; color: var(--ink-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; }

.no-results { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
.no-results h3 { font-family: 'Playfair Display', serif; font-weight: 600; color: var(--ink); margin-bottom: 6px; }

/* Detail screen */
.detail-header {
  background: var(--maroon);
  color: var(--cream);
  padding: 12px 18px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: var(--shadow-md);
}
.back-btn {
  background: rgba(251, 245, 232, 0.12); border: none;
  color: var(--cream); width: 38px; height: 38px; border-radius: 10px;
  font-size: 22px; line-height: 1; cursor: pointer;
}
.detail-header-text { flex: 1; min-width: 0; }
.detail-header-text .sub { font-size: 10px; opacity: 0.7; letter-spacing: 1.5px; text-transform: uppercase; }
.detail-header-text .name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

/* Status banner */
.status-banner {
  padding: 14px 18px;
  font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}
.status-banner .emoji { font-size: 20px; }
.status-banner.growing { background: #E8F4ED; color: #1F5A37; border-bottom: 2px solid #B8DFC5; }
.status-banner.stable { background: #EDF1F7; color: #2A3D5E; border-bottom: 2px solid #C9D4E5; }
.status-banner.shrinking { background: #FCEFD7; color: #7A4E18; border-bottom: 2px solid #E8C988; }
.status-banner.dormant { background: #F8E0DC; color: #7A2520; border-bottom: 2px solid #E3B5AE; }
.status-banner.new { background: #FBF1C7; color: #6C5414; border-bottom: 2px solid #E8D580; }

.status-banner strong { font-weight: 700; }

/* Context panel */
.context {
  background: var(--cream-soft);
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}
.context-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 14px;
}
.context-stat {
  background: white; border-radius: 8px;
  padding: 10px 8px; text-align: center;
  border: 1px solid var(--line);
}
.context-stat .num { font: 700 14px 'Playfair Display', serif; color: var(--maroon); line-height: 1; }
.context-stat .num.green { color: var(--green); }
.context-stat .num.red { color: var(--red); }
.context-stat .lbl { font-size: 9px; color: var(--ink-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

.context-block { margin-bottom: 14px; }
.context-block:last-child { margin-bottom: 0; }
.context-block h4 {
  font: 700 10px 'DM Sans', sans-serif;
  color: var(--ink-muted);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 6px;
}
.cat-pill-row { display: flex; flex-wrap: wrap; gap: 5px; }
.cat-pill {
  background: white; border: 1px solid var(--line);
  padding: 5px 10px; border-radius: 100px;
  font: 600 11px 'DM Sans', sans-serif; color: var(--ink-soft);
}
.cat-pill.rev { background: var(--maroon); color: var(--cream); border-color: var(--maroon); }
.cat-pill.vol { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.cat-pill.gap { background: white; border: 1.5px dashed var(--amber); color: var(--amber-dark); }
.cat-pill .pct { font-weight: 500; opacity: 0.8; margin-left: 3px; }

.address-row { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
.address-row strong { color: var(--ink); font-weight: 600; }

/* Form */
.form {
  padding: 18px 18px 120px;
  background: var(--cream);
}
.form-section {
  margin-bottom: 22px;
}
.form-section-title {
  font: 700 11px 'DM Sans', sans-serif;
  color: var(--amber-dark);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1.5px solid var(--amber);
  display: flex; align-items: center; gap: 6px;
}

.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font: 600 12px 'DM Sans', sans-serif;
  color: var(--ink); margin-bottom: 6px;
}
.field label .req { color: var(--red); font-weight: 700; }
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px;
  background: white; border: 1.5px solid var(--line); border-radius: 10px;
  font: 500 15px 'DM Sans', sans-serif; color: var(--ink);
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--amber);
}
.field textarea {
  resize: vertical; min-height: 80px; font-family: 'DM Sans', sans-serif;
}

/* Pill-style choice fields */
.pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
.pill-choice {
  padding: 9px 14px;
  background: white; border: 1.5px solid var(--line);
  border-radius: 100px;
  font: 600 13px 'DM Sans', sans-serif; color: var(--ink-soft);
  cursor: pointer; transition: all 0.15s;
}
.pill-choice.selected { background: var(--maroon); color: var(--cream); border-color: var(--maroon); }
.pill-choice:active:not(.selected) { background: var(--cream-soft); }

.pill-choice.status-visited.selected { background: var(--green); border-color: var(--green); }
.pill-choice.status-attempted.selected { background: var(--orange); border-color: var(--orange); }
.pill-choice.status-skip.selected { background: var(--ink-muted); border-color: var(--ink-muted); }

/* Sticky submit bar */
.submit-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--cream);
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--line);
  z-index: 30;
  box-shadow: 0 -4px 16px rgba(74, 8, 8, 0.06);
}
.submit-btn {
  width: 100%; padding: 16px;
  background: var(--maroon); color: var(--cream);
  border: none; border-radius: 12px;
  font: 700 15px 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.submit-btn:disabled { background: var(--ink-muted); cursor: not-allowed; }
.submit-btn:active:not(:disabled) { background: var(--maroon-dark); transform: scale(0.99); }
.submit-btn .spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(251, 245, 232, 0.3);
  border-top-color: var(--cream);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(42, 24, 16, 0.5);
  z-index: 100;
  display: none;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--cream);
  width: 100%; max-width: 500px;
  border-radius: 16px 16px 0 0;
  padding: 22px 20px;
  padding-bottom: calc(22px + env(safe-area-inset-bottom));
  max-height: 80vh; overflow-y: auto;
}
.modal h3 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; margin-bottom: 4px; color: var(--ink); }
.modal p { font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; }
.modal .field { margin-bottom: 14px; }

/* Success screen */
.success {
  padding: 80px 24px 24px;
  text-align: center;
}
.success .check {
  width: 88px; height: 88px;
  background: var(--green); color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; font-weight: 700;
  margin: 0 auto 22px;
  animation: pop 0.4s ease-out;
}
@keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
.success h2 { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 24px; margin-bottom: 8px; color: var(--ink); }
.success p { color: var(--ink-soft); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
.success .name-strong { font-weight: 700; color: var(--maroon); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--cream);
  padding: 11px 18px;
  border-radius: 100px;
  font: 500 13px 'DM Sans', sans-serif;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }

@media (min-width: 700px) {
  .screen { max-width: 600px; margin: 0 auto; }
}
</style>
</head>

<!-- ============ SCREEN: CLIENT LIST ============ -->
<div id="screen-list" class="screen active">
  <div class="app-header">
    <h1>
      <span class="sub">VISHRAM SPICES</span>
      Client Visits
    </h1>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div class="search-bar">
    <input id="searchInput" type="search" placeholder="Search by name or code..." autocomplete="off">
  </div>

  <div class="filter-chips" id="filterChips">
    <button class="chip active" data-filter="all">All</button>
    <button class="chip" data-filter="pending">Not Visited</button>
    <button class="chip" data-filter="done">Visited</button>
    <button class="chip" data-filter="GROWING">🟢 Growing</button>
    <button class="chip" data-filter="STABLE">✅ Stable</button>
    <button class="chip" data-filter="SHRINKING">🔴 Shrinking</button>
    <button class="chip" data-filter="DORMANT">🔴 Dormant</button>
    <button class="chip" data-filter="NEW">🆕 New</button>
    <button class="chip" data-filter="EXPRESS INN">Express Inn</button>
    <button class="chip" data-filter="MAO">Mao</button>
    <button class="chip" data-filter="TVT">TVT</button>
    <button class="chip" data-filter="MERITAS">Meritas</button>
  </div>

  <div class="client-list" id="clientList">
    <div class="stats-row" id="statsRow"></div>
    <div id="clientCards"></div>
  </div>
</div>

<!-- ============ SCREEN: CLIENT DETAIL + FORM ============ -->
<div id="screen-detail" class="screen">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">‹</button>
    <div class="detail-header-text">
      <div class="sub" id="detailCode">—</div>
      <div class="name" id="detailName">—</div>
    </div>
  </div>

  <div id="detailContent"></div>

  <div class="submit-bar">
    <button class="submit-btn" id="submitBtn">Save Visit</button>
  </div>
</div>

<!-- ============ SCREEN: SUCCESS ============ -->
<div id="screen-success" class="screen">
  <div class="success">
    <div class="check">✓</div>
    <h2>Visit Saved</h2>
    <p>Data captured for <span class="name-strong" id="successName">—</span>. You can edit by visiting again.</p>
    <button class="submit-btn" onclick="goToList()">Back to Client List</button>
  </div>
</div>

<!-- ============ MODAL: SETTINGS ============ -->
<div id="settingsModal" class="modal-overlay">
  <div class="modal">
    <h3>Settings</h3>
    <p>Configure once. Saved on this device.</p>
    
    <div class="field">
      <label>Your Name (Visited By)</label>
      <input id="settingVisitor" type="text" placeholder="e.g. Krushang">
    </div>
    
    <div class="field">
      <label>Google Apps Script URL</label>
      <input id="settingWebhook" type="url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    
    <button class="submit-btn" onclick="saveSettings()">Save Settings</button>
    <button class="submit-btn" style="background: var(--ink-muted); margin-top: 8px;" onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- ============ TOAST ============ -->
<div id="toast" class="toast">—</div>

  '🟢 GROWING': { className: 'growing', text: 'Push more — what else can we supply?' },
  '✅ STABLE': { className: 'stable', text: 'Steady relationship — explore deeper.' },
  '🔴 SHRINKING': { className: 'shrinking', text: 'Find out why revenue is dropping.' },

};

// === STATE ===
let currentFilter = 'all';
let currentSearch = '';
let currentClient = null;
let formState = {};
let isSubmitting = false;

// Visit records: { code: {status, data, timestamp} }
function getVisits() { try { return JSON.parse(localStorage.getItem('vsp_visits') || '{}'); } catch(e) { return {}; } }
function setVisit(code, record) {
  const visits = getVisits();
  visits[code] = record;
  localStorage.setItem('vsp_visits', JSON.stringify(visits));
}

function getSettings() { try { return JSON.parse(localStorage.getItem('vsp_settings') || '{}'); } catch(e) { return {}; } }
function setSettings(s) { localStorage.setItem('vsp_settings', JSON.stringify(s)); }

// === HELPERS ===
function fmtINR(n) {
  if (!n) return '₹0';
  if (n >= 10000000) return '₹' + (n/10000000).toFixed(2) + ' Cr';
  if (n >= 100000) return '₹' + (n/100000).toFixed(1) + ' L';
  if (n >= 1000) return '₹' + (n/1000).toFixed(0) + ' K';
  return '₹' + n;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'error' ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function getVisitStatus(code) {
  const visits = getVisits();
  return visits[code] ? visits[code].status : null;
}

// === RENDER: LIST ===
function renderList() {
  const visits = getVisits();
  let filtered = CLIENTS;
  
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(c => 
      (c.name || '').toLowerCase().includes(q) ||
      (c.code || '').toLowerCase().includes(q)
    );
  }
  
  if (currentFilter !== 'all') {
    if (currentFilter === 'pending') {
      filtered = filtered.filter(c => !visits[c.code]);
    } else if (currentFilter === 'done') {
      filtered = filtered.filter(c => visits[c.code] && visits[c.code].status === 'Visited');
    } else if (['GROWING', 'STABLE', 'SHRINKING', 'DORMANT', 'NEW'].includes(currentFilter)) {
      filtered = filtered.filter(c => c.status.includes(currentFilter));
    } else {
      filtered = filtered.filter(c => c.chain === currentFilter);
    }
  }
  
  // Stats
  const total = CLIENTS.length;
  const done = Object.values(visits).filter(v => v.status === 'Visited').length;
  const attempted = Object.values(visits).filter(v => v.status === 'Attempted - Not Met').length;
  const skipped = Object.values(visits).filter(v => v.status && v.status.startsWith('Skip')).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><span class="num">${total}</span><span class="lbl">Total</span></div>
    <div class="stat-pill"><span class="num">${done}</span><span class="lbl">Visited</span></div>
    <div class="stat-pill"><span class="num">${attempted}</span><span class="lbl">Tried</span></div>
    <div class="stat-pill"><span class="num">${total - done - attempted - skipped}</span><span class="lbl">Pending</span></div>
  `;
  
  const cards = document.getElementById('clientCards');
  if (!filtered.length) {
    cards.innerHTML = '<div class="no-results"><h3>No clients match</h3><p>Try a different search or filter.</p></div>';
    return;
  }
  
  cards.innerHTML = filtered.map(c => {
    const v = visits[c.code];
    let visitClass = '';
    if (v) {
      if (v.status === 'Visited') visitClass = 'visited';
      else if (v.status === 'Attempted - Not Met') visitClass = 'attempted';
      else if (v.status && v.status.startsWith('Skip')) visitClass = 'skipped';
    }
    
    return `
      <div class="client-card ${visitClass}" onclick="openClient('${c.code}')">
        <div class="card-main">
          <div class="card-name">${escapeHtml(c.name)}</div>
          <div class="card-meta">
            ${c.chain ? `<span class="chain-tag">${c.chain}</span>` : ''}
            <span class="status-dot">${c.status}</span>
          </div>
        </div>
        <div class="card-rev">
          <span class="lbl">FY26</span>
          ${fmtINR(c.rev26)}
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// === RENDER: DETAIL ===
function openClient(code) {
  currentClient = CLIENTS.find(c => c.code === code);
  if (!currentClient) return;
  
  document.getElementById('detailCode').textContent = currentClient.code + (currentClient.chain ? ' · ' + currentClient.chain : '');
  document.getElementById('detailName').textContent = currentClient.name;
  
  const visits = getVisits();
  const existing = visits[code] ? visits[code].data : {};
  formState = { ...existing };
  
  const statusInfo = STATUS_PROMPTS[currentClient.status] || { className: 'stable', text: '' };
  const c = currentClient;
  
  let context = `
    <div class="status-banner ${statusInfo.className}">
      <span class="emoji">${c.status.split(' ')[0]}</span>
      <span><strong>${c.status.split(' ').slice(1).join(' ')}</strong> · ${statusInfo.text}</span>
    </div>
    
    <div class="context">
      <div class="context-grid">
        <div class="context-stat"><div class="num">${fmtINR(c.rev26)}</div><div class="lbl">FY26 Rev</div></div>
        <div class="context-stat"><div class="num ${c.yoy.startsWith('+') ? 'green' : 'red'}">${c.yoy}</div><div class="lbl">YoY</div></div>
        <div class="context-stat"><div class="num">${fmtINR(c.rev3y)}</div><div class="lbl">3Y Total</div></div>
        <div class="context-stat"><div class="num">${c.inv26}</div><div class="lbl">Invoices</div></div>
        <div class="context-stat"><div class="num">${fmtINR(c.avgOrder)}</div><div class="lbl">Avg Order</div></div>
        <div class="context-stat"><div class="num">${c.gaps.length}/16</div><div class="lbl">Cat Gaps</div></div>
      </div>
      
      ${c.topRev.length ? `
        <div class="context-block">
          <h4>Top by Revenue</h4>
          <div class="cat-pill-row">
            ${c.topRev.map(t => `<span class="cat-pill rev">${t.cat}<span class="pct"> ${t.pct}%</span></span>`).join('')}
          </div>
        </div>
      ` : ''}
      
      ${c.topVol.length ? `
        <div class="context-block">
          <h4>Top by Volume</h4>
          <div class="cat-pill-row">
            ${c.topVol.map(t => `<span class="cat-pill vol">${t.cat}<span class="pct"> ${t.pct}%</span></span>`).join('')}
          </div>
        </div>
      ` : ''}
      
      ${c.gaps.length ? `
        <div class="context-block">
          <h4>Upsell Opportunities · Zero Spend</h4>
          <div class="cat-pill-row">
            ${c.gaps.slice(0, 8).map(g => `<span class="cat-pill gap">${g}</span>`).join('')}
          </div>
        </div>
      ` : ''}
      
      <div class="address-row">
        ${c.address ? `<strong>Address:</strong> ${escapeHtml(c.address)}${c.pin ? ' · ' + c.pin : ''}<br>` : ''}
        ${c.gstin ? `<strong>GSTIN:</strong> ${c.gstin}` : ''}
      </div>
    </div>
  `;
  
  // ===== FORM =====
  const f = formState;
  const isNonVisitable = !!c.nonVisitable;
  const defaultStatus = isNonVisitable ? 'Skip - Non-visitable' : (f.visitStatus || '');
  
  let form = `
    <div class="form">
      <div class="form-section">
        <div class="form-section-title">Visit Status</div>
        <div class="pill-group" id="pills-visitStatus">
          ${['Visited', 'Attempted - Not Met', 'Skip - Decided', 'Skip - Non-visitable'].map(s => {
            let cls = 'pill-choice';
            if (s === 'Visited') cls += ' status-visited';
            else if (s === 'Attempted - Not Met') cls += ' status-attempted';
            else cls += ' status-skip';
            if (defaultStatus === s) cls += ' selected';
            return `<button class="${cls}" onclick="setPill('visitStatus', '${s}', this)">${s}</button>`;
          }).join('')}
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">Contact Details</div>
        <div class="field">
          <label>Owner / Decision Maker</label>
          <input type="text" id="f-ownerName" value="${escapeHtml(f.ownerName || '')}" placeholder="Name">
        </div>
        <div class="field">
          <label>Owner Mobile</label>
          <input type="tel" id="f-ownerMobile" value="${escapeHtml(f.ownerMobile || '')}" placeholder="10-digit number" inputmode="numeric">
        </div>
        <div class="field">
          <label>Procurement Person <span style="font-weight:400;color:var(--ink-muted)">(if different)</span></label>
          <input type="text" id="f-procName" value="${escapeHtml(f.procName || '')}" placeholder="Name">
        </div>
        <div class="field">
          <label>Procurement Mobile</label>
          <input type="tel" id="f-procMobile" value="${escapeHtml(f.procMobile || '')}" placeholder="10-digit number" inputmode="numeric">
        </div>
        <div class="field">
          <label>Client Type</label>
          <select id="f-clientType">
            <option value="">— Select —</option>
            ${CLIENT_TYPES.map(t => `<option value="${t}" ${f.clientType === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">Commercial</div>
        <div class="field">
          <label>Payment Terms</label>
          <div class="pill-group" id="pills-paymentTerms">
            ${PAYMENT_TERMS.map(t => `<button class="pill-choice ${f.paymentTerms === t ? 'selected' : ''}" onclick="setPill('paymentTerms', '${t}', this)">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Payment Behaviour</label>
          <div class="pill-group" id="pills-paymentBehaviour">
            ${PAYMENT_BEHAVIOUR.map(t => `<button class="pill-choice ${f.paymentBehaviour === t ? 'selected' : ''}" onclick="setPill('paymentBehaviour', '${t.replace(/'/g, '\\\'')}', this)">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Client Since (Year)</label>
          <input type="number" id="f-clientSince" value="${escapeHtml(f.clientSince || '')}" placeholder="e.g. 2015" inputmode="numeric" min="1970" max="2026">
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">Intelligence</div>
        <div class="field">
          <label>Number of Outlets</label>
          <input type="number" id="f-numOutlets" value="${escapeHtml(f.numOutlets || '')}" placeholder="1" inputmode="numeric" min="1">
        </div>
        <div class="field">
          <label>Order Frequency</label>
          <div class="pill-group" id="pills-orderFrequency">
            ${ORDER_FREQUENCY.map(t => `<button class="pill-choice ${f.orderFrequency === t ? 'selected' : ''}" onclick="setPill('orderFrequency', '${t.replace(/'/g, '\\\'')}', this)">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Preferred Order Channel</label>
          <div class="pill-group" id="pills-channel">
            ${ORDER_CHANNELS.map(t => `<button class="pill-choice ${f.channel === t ? 'selected' : ''}" onclick="setPill('channel', '${t}', this)">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Competitors <span style="font-weight:400;color:var(--ink-muted)">(who else they buy from)</span></label>
          <input type="text" id="f-competitors" value="${escapeHtml(f.competitors || '')}" placeholder="e.g. ABC Wholesale, XYZ Traders">
        </div>
      </div>
      
      <div class="form-section">
        <div class="form-section-title">Action</div>
        <div class="field">
          <label>Next Follow-Up Date</label>
          <input type="date" id="f-nextFollowUp" value="${escapeHtml(f.nextFollowUp || '')}">
        </div>
        <div class="field">
          <label>Visit Notes <span style="font-weight:400;color:var(--ink-muted)">(pain points, opportunities, anything else)</span></label>
          <textarea id="f-notes" placeholder="What did they say? What's bothering them? What did you commit to?">${escapeHtml(f.notes || '')}</textarea>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('detailContent').innerHTML = context + form;
  if (defaultStatus) formState.visitStatus = defaultStatus;
  
  // Auto-save form state on input
  document.getElementById('detailContent').addEventListener('input', autoSave);
  document.getElementById('detailContent').addEventListener('change', autoSave);
  
  switchScreen('screen-detail');
  window.scrollTo(0, 0);
}

function setPill(field, value, btn) {
  const group = btn.closest('.pill-group');
  group.querySelectorAll('.pill-choice').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  formState[field] = value;
}

function autoSave() {
  const f = formState;
  f.ownerName = (document.getElementById('f-ownerName') || {}).value || '';
  f.ownerMobile = (document.getElementById('f-ownerMobile') || {}).value || '';
  f.procName = (document.getElementById('f-procName') || {}).value || '';
  f.procMobile = (document.getElementById('f-procMobile') || {}).value || '';
  f.clientType = (document.getElementById('f-clientType') || {}).value || '';
  f.clientSince = (document.getElementById('f-clientSince') || {}).value || '';
  f.numOutlets = (document.getElementById('f-numOutlets') || {}).value || '';
  f.competitors = (document.getElementById('f-competitors') || {}).value || '';
  f.nextFollowUp = (document.getElementById('f-nextFollowUp') || {}).value || '';
  f.notes = (document.getElementById('f-notes') || {}).value || '';
  formState = f;
}

// === SUBMIT ===
async function submitForm() {
  if (isSubmitting) return;
  
  autoSave();
  
  if (!formState.visitStatus) {
    showToast('Pick a visit status first', 'error');
    return;
  }
  
  const settings = getSettings();
  if (!settings.webhook) {
    showToast('Set up the Apps Script URL in Settings first', 'error');
    openSettings();
    return;
  }
  if (!settings.visitor) {
    showToast('Set your name in Settings first', 'error');
    openSettings();
    return;
  }
  
  isSubmitting = true;
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  
  // Build payload
  const payload = {
    timestamp: new Date().toISOString(),
    visitDate: new Date().toLocaleDateString('en-IN'),
    visitedBy: settings.visitor,
    clientCode: currentClient.code,
    clientName: currentClient.name,
    chain: currentClient.chain || '',
    erpStatus: currentClient.status,
    erpRev3y: currentClient.rev3y,
    erpRev26: currentClient.rev26,
    erpYoY: currentClient.yoy,
    visitStatus: formState.visitStatus || '',
    ownerName: formState.ownerName || '',
    ownerMobile: formState.ownerMobile || '',
    procName: formState.procName || '',
    procMobile: formState.procMobile || '',
    clientType: formState.clientType || '',
    paymentTerms: formState.paymentTerms || '',
    paymentBehaviour: formState.paymentBehaviour || '',
    clientSince: formState.clientSince || '',
    numOutlets: formState.numOutlets || '',
    orderFrequency: formState.orderFrequency || '',
    channel: formState.channel || '',
    competitors: formState.competitors || '',
    nextFollowUp: formState.nextFollowUp || '',
    notes: formState.notes || '',
  };
  
  try {
    const formData = new FormData();
    Object.keys(payload).forEach(k => formData.append(k, payload[k]));
    
    const response = await fetch(settings.webhook, {
      method: 'POST',
      body: formData,
    });
    
    // Save locally regardless (offline-friendly)
    setVisit(currentClient.code, {
      status: formState.visitStatus,
      data: formState,
      timestamp: new Date().toISOString(),
    });
    
    document.getElementById('successName').textContent = currentClient.name;
    switchScreen('screen-success');
  } catch (err) {
    console.error(err);
    // Still save locally so they don't lose work
    setVisit(currentClient.code, {
      status: formState.visitStatus,
      data: formState,
      timestamp: new Date().toISOString(),
      pendingSync: true,
    });
    showToast('Saved locally. Will sync when online.', 'error');
    document.getElementById('successName').textContent = currentClient.name;
    switchScreen('screen-success');
  } finally {
    isSubmitting = false;
    btn.innerHTML = 'Save Visit';
    btn.disabled = false;
  }
}

// === SCREENS ===
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goToList() {
  switchScreen('screen-list');
  renderList();
  window.scrollTo(0, 0);
}

// === SETTINGS ===
function openSettings() {
  const s = getSettings();
  document.getElementById('settingVisitor').value = s.visitor || '';
  document.getElementById('settingWebhook').value = s.webhook || '';
  document.getElementById('settingsModal').classList.add('active');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}
function saveSettings() {
  const visitor = document.getElementById('settingVisitor').value.trim();
  const webhook = document.getElementById('settingWebhook').value.trim();
  if (!visitor || !webhook) {
    showToast('Fill in both fields', 'error');
    return;
  }
  setSettings({ visitor, webhook });
  showToast('Settings saved');
  closeSettings();
}

// === INIT ===
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderList();
});
document.querySelectorAll('#filterChips .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#filterChips .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderList();
  });
});
document.getElementById('backBtn').addEventListener('click', goToList);
document.getElementById('submitBtn').addEventListener('click', submitForm);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target.id === 'settingsModal') closeSettings();
});

// First-run prompt
window.addEventListener('load', () => {
  renderList();
  const s = getSettings();
  if (!s.visitor || !s.webhook) {
    setTimeout(openSettings, 600);
  }
});
</script>
</body>
</html>
